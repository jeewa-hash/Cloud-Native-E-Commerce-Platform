name: Orderservice CI/CD

on:
  push:
    branches: [ "main" ]
    # Removed paths for testing; add back only if your code is in a subfolder

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Updated to v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install
        # working-directory: ./OrderService # Uncomment if folder exists

      # --- REQUIRED FOR ASSIGNMENT: DEVSECOPS SCAN ---
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        continue-on-error: true # So the pipeline doesn't stop if it finds a small bug
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME_ORDERSERVICE }}
          password: ${{ secrets.DOCKER_PASSWORD_ORDERSERVICE }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # context: ./OrderService # Uncomment if folder exists
          push: true
          tags: ${{ secrets.DOCKER_USERNAME_ORDERSERVICE }}/orderservice:latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json # Ensure this file is in your repo
          container-name: orderservice
          image: ${{ secrets.DOCKER_USERNAME_ORDERSERVICE }}/orderservice:latest

      - name: Deploy ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: orderservice
          cluster: ordermicroservices-cluster
          wait-for-service-stability: true