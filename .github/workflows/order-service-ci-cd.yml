name: Order Service CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the code
      - uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Install dependencies
      - run: npm install

      # 4️⃣ Run tests (skip if none)
      - run: npm test || echo "No tests"

      # 5️⃣ Log in to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6️⃣ Build Docker image
      - name: Build Docker image
        run: docker build -t yourdockerhub/order-service:1.0 .

      # 7️⃣ Push Docker image
      - name: Push Docker image
        run: docker push yourdockerhub/order-service:1.0

      # 8️⃣ Configure AWS CLI
      - name: Configure AWS
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws configure set region ${{ secrets.AWS_REGION }}

      # 9️⃣ Deploy to ECS Fargate
      - name: Deploy to ECS
        run: |
          aws ecs update-service --cluster OrderCluster --service OrderService --force-new-deployment
