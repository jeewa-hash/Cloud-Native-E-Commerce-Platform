name: Orderservice CI/CD

on:
  push:
    paths:
      - 'OrderService/**'
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install
        working-directory: ./OrderService

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME_ORDERSERVICE }}
          password: ${{ secrets.DOCKER_PASSWORD_ORDERSERVICE }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./OrderService
          push: true
          tags: ${{ secrets.DOCKER_USERNAME_ORDERSERVICE }}/orderservice:latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: OrderService/task-definition.json
          container-name: orderservice
          image: ${{ secrets.DOCKER_USERNAME_ORDERSERVICE }}/orderservice:latest

      - name: Deploy ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: orderservice
          cluster: ordermicroservices-cluster
          wait-for-service-stability: true