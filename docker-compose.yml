version: '3.8'

services:

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-auth-service:
    build:
      context: .
      dockerfile: UserAuthenticationService/Dockerfile
    container_name: user-auth-service
    ports:
      - "5002:5002"
    environment:
      - MONGO_URI=your_mongodb_uri
      - JWT_SECRET=super_secret_jwt_key_here
      - PORT=5002

  shop-service:
    build:
      context: .
      dockerfile: ShopManagementService/Dockerfile
    container_name: shop-service
    ports:
      - "4040:4040"
    environment:
      - MONGO_URI=your_mongodb_uri
      - JWT_SECRET=super_secret_jwt_key_here
      - PORT=4040

  order-service:
    build:
      context: .
      dockerfile: OrderManagementService/Dockerfile
    container_name: order-service
    ports:
      - "4000:4000"
    environment:
      - MONGO_URI=your_mongodb_uri
      - JWT_SECRET=super_secret_jwt_key_here
      - SHOP_SERVICE_URL=http://shop-service:4040/api/products
      - RABBITMQ_URL=amqp://rabbitmq
      - PORT=4000
    depends_on:
      rabbitmq:
        condition: service_healthy
  
  delivery-service:
    build:
      context: .
      dockerfile: DeliveryManagementService/Dockerfile
    container_name: delivery-service
    ports:
      - "5003:5003"
    environment:
      - MONGO_URI=your_mongodb_uri
      - JWT_SECRET=super_secret_jwt_key_here
      - SHOP_SERVICE_URL=http://shop-service:4040/api/products
      - AUTH_SERVICE_URL=http://user-auth-service:5002/api/user
      - ORDER_SERVICE_URL=http://order-service:4000/api/order
      - RABBITMQ_URL=amqp://rabbitmq
      - PORT=5003
    depends_on:
      rabbitmq:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: NotificationService/Dockerfile
    container_name: notification-service
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=your_mongodb_uri
      - RABBITMQ_URL=amqp://rabbitmq
      - PORT=5000
    depends_on:
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Frontend/Dockerfile
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - user-auth-service
      - shop-service
      - order-service
      - notification-service
      - delivery-service